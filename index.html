<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ═══════════════════════════════════════════════════════
// MODEL — BÜ Dreieich-Buchschlag (5 Gleise)
// ═══════════════════════════════════════════════════════

const CLOSE_BEFORE = 180;
const OPEN_AFTER = 40;
const MERGE_GAP = 240;
const MIN_OPEN = 90;

const CAT_META = {
  S:  { color: "#34d399", label: "S-Bahn", dot: "S" },
  RB: { color: "#f472b6", label: "RB", dot: "R" },
  RE: { color: "#f472b6", label: "RE", dot: "R" },
  ICE:{ color: "#a78bfa", label: "ICE", dot: "F" },
  IC: { color: "#a78bfa", label: "IC", dot: "F" },
  EC: { color: "#a78bfa", label: "EC", dot: "F" },
  G:  { color: "#737373", label: "Güter", dot: "G" },
};

function buildSchedule(date) {
  const day = date.getDay();
  const isSun = day === 0, isSat = day === 6, isWd = !isSun && !isSat;
  const trains = [];
  const add = (h, m, cat, line, dest, track, stops) => {
    if (h < 0 || h > 23) return;
    const t = new Date(date); t.setHours(h, m, 0, 0);
    trains.push({ id:`${line.replace(/\s/g,"")}-${h}${String(m).padStart(2,"0")}`, cat, line, dest, track, stops, sched:new Date(t), actual:new Date(t), delay:0, through:!stops });
  };
  for (let h = 5; h <= 23; h++) {
    const hvz = isWd && ((h >= 6 && h <= 9) || (h >= 16 && h <= 19));
    const s6m = (hvz ? [8,23,38,53] : (h===5||h===23) ? [38] : [8,38]);
    s6m.forEach(m => {
      add(h, m, "S", "S 6", m%30===8 ? "Friedberg" : "Bad Vilbel", 2, true);
      add(h, m, "S", "S 6", m%30===8 ? "Darmstadt" : "Langen", 3, true);
    });
    if (h >= 6 && h <= 22) {
      add(h, 27, "RB", "RB 61", h%2===0 ? "Dieburg" : "Ffm Hbf", 1, true);
      if (hvz || (h >= 7 && h <= 20 && !isSun)) add(h, 50, "RB", "RB 61", h%2===0 ? "Ffm Hbf" : "Ober Roden", 1, true);
    }
    if (h >= 6 && h <= 22) {
      add(h, 12, "ICE", `ICE ${100+h*2}`, "Stuttgart", 4, false);
      add(h, 18, "ICE", `ICE ${101+h*2}`, "Frankfurt", 5, false);
      if (h%2===0) add(h, 42, "IC", `IC ${200+h}`, "Heidelberg", 4, false);
      if (h%2===1) add(h, 48, "EC", `EC ${50+h}`, "Frankfurt", 5, false);
    }
    if (h < 7 || h > 20) { add(h, 5, "G", "GZ", "Mannheim", 4, false); add(h, 35, "G", "GZ", "Ffm Ost", 5, false); }
    else if (h%3===0) add(h, 32, "G", "GZ", "Mannheim", 4, false);
  }
  return trains.sort((a, b) => a.sched - b.sched);
}

function addDelays(trains, seed) {
  let s = seed + 7;
  const rnd = () => { s = (s * 48271) % 2147483647; return s / 2147483647; };
  return trains.map(t => {
    const r = rnd(); let d = 0;
    if (t.cat === "G" && r < 0.35) d = 1 + Math.floor(rnd() * 18);
    else if (["ICE","IC","EC"].includes(t.cat) && r < 0.3) d = 1 + Math.floor(rnd() * 12);
    else if (t.cat === "S" && r < 0.2) d = 1 + Math.floor(rnd() * 6);
    else if (t.cat === "RB" && r < 0.15) d = 1 + Math.floor(rnd() * 8);
    return { ...t, delay: d, actual: new Date(t.sched.getTime() + d * 60000) };
  });
}

function calcPhases(trains) {
  const evts = trains.map(t => ({ close:new Date(t.actual.getTime()-CLOSE_BEFORE*1000), open:new Date(t.actual.getTime()+OPEN_AFTER*1000), train:t })).sort((a,b)=>a.close-b.close);
  const phases = []; let cur = null;
  for (const e of evts) {
    if (!cur) { cur = { closeAt:e.close, openAt:e.open, trains:[e.train] }; }
    else {
      const gap = (e.close - cur.openAt) / 1000;
      if (gap < MERGE_GAP || gap < MIN_OPEN) { cur.openAt = new Date(Math.max(cur.openAt.getTime(), e.open.getTime())); cur.trains.push(e.train); }
      else { phases.push(cur); cur = { closeAt:e.close, openAt:e.open, trains:[e.train] }; }
    }
  }
  if (cur) phases.push(cur);
  return phases;
}

function getStatus(phases, now) {
  for (const p of phases) { if (now >= p.closeAt && now <= p.openAt) return { closed:true, until:p.openAt, since:p.closeAt, phase:p }; }
  const next = phases.find(p => p.closeAt > now);
  return { closed:false, until:next?.closeAt||null, nextPhase:next||null };
}

const fmt = d => d ? d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}) : "—";
const fmtS = d => d ? d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "";
function cd(target, now) { if(!target) return {m:"—",s:"—",t:Infinity}; const d=Math.max(0,Math.floor((target-now)/1000)); return {m:String(Math.floor(d/60)).padStart(2,"0"),s:String(d%60).padStart(2,"0"),t:d}; }
function durMin(a, b) { return Math.max(1, Math.round((b - a) / 60000)); }

// ─── LIVE DATA ──────────────────────────────────────
const EVA = "8001236";
const REST_API = "https://v6.db.transport.rest";

function mapProduct(p) {
  if (p==="nationalExpress") return "ICE"; if (p==="national") return "IC";
  if (p==="regionalExpress") return "RE"; if (p==="regional") return "RB";
  if (p==="suburban") return "S"; return "S";
}

async function fetchLiveTrains() {
  try {
    const url = `${REST_API}/stops/${EVA}/departures?duration=120&results=60&bus=false&ferry=false&taxi=false`;
    const res = await fetch(url); if (!res.ok) throw new Error(`${res.status}`);
    const raw = await res.json();
    const deps = Array.isArray(raw) ? raw : (raw.departures || []);
    const arrUrl = `${REST_API}/stops/${EVA}/arrivals?duration=120&results=60&bus=false&ferry=false&taxi=false`;
    let arrs = [];
    try { const r2 = await fetch(arrUrl); if (r2.ok) { const ra = await r2.json(); arrs = Array.isArray(ra) ? ra : (ra.arrivals||[]); } } catch(e){}
    const seen = new Set(deps.map(d=>d.tripId));
    const all = [...deps];
    arrs.forEach(a => { if(!seen.has(a.tripId)){all.push(a);seen.add(a.tripId);} });
    const trains = all.map((d,i) => {
      const cat = mapProduct(d.line?.product||"");
      return { id:`live-${d.tripId||i}`, cat, line:d.line?.name||cat, dest:d.direction||d.destination?.name||"—", track:parseInt(d.platform||d.plannedPlatform||"1"), stops:["S","RB","RE"].includes(cat), sched:new Date(d.plannedWhen||d.when), actual:new Date(d.when||d.plannedWhen), delay:Math.round((d.delay||0)/60), through:!["S","RB","RE"].includes(cat) };
    });
    return trains.length > 0 ? trains.sort((a,b)=>a.sched-b.sched) : null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════════════

function StatusOrb({ closed }) {
  const color = closed ? "#ef4444" : "#22c55e";
  return (
    <div style={{ position:"relative", width:12, height:12, flexShrink:0 }}>
      <div style={{ position:"absolute", inset:0, borderRadius:"50%", background:color, animation:"breathe 3s ease-in-out infinite" }} />
      <div style={{ position:"absolute", inset:-4, borderRadius:"50%", border:`1.5px solid ${color}40`, animation:"pulseRing 3s ease-out infinite" }} />
    </div>
  );
}

function HeroCountdown({ target, now, closed }) {
  const c = cd(target, now);
  const isUrgent = c.t < 120;
  const isCritical = c.t < 30;
  const textColor = closed
    ? (isCritical ? "#fbbf24" : "#ffffff")
    : (isUrgent ? "#f97316" : "#ffffff");

  return (
    <div style={{ textAlign:"center", animation:"countIn .5s ease-out both" }}>
      <div className="mono" style={{ display:"flex", alignItems:"baseline", justifyContent:"center", gap:2, lineHeight:1 }}>
        <span style={{ fontSize:"min(96px, 22vw)", fontWeight:300, letterSpacing:"-0.04em", color:textColor, transition:"color .8s" }}>{c.m}</span>
        <span style={{ fontSize:"min(60px, 14vw)", fontWeight:300, color:"#333", lineHeight:1, marginBottom:"0.05em" }}>:</span>
        <span style={{ fontSize:"min(96px, 22vw)", fontWeight:300, letterSpacing:"-0.04em", color:textColor, transition:"color .8s" }}>{c.s}</span>
      </div>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.25em", textTransform:"uppercase", color:"#555", marginTop:12 }}>
        {closed ? "öffnet in" : "schließt in"}
      </div>
      {target && (
        <div className="mono" style={{ fontSize:13, color:"#444", marginTop:6 }}>
          {fmt(target)}
        </div>
      )}
    </div>
  );
}

function ActionHint({ closed, status, now, phases }) {
  if (closed && status.until) {
    const r = cd(status.until, now);
    if (r.t > 300) return (
      <div style={{ padding:"14px 20px", background:"#111", borderRadius:16, border:"1px solid #222", textAlign:"center" }}>
        <div style={{ fontSize:14, fontWeight:600, color:"#999" }}>Umfahrung empfohlen</div>
        <div style={{ fontSize:12, color:"#555", marginTop:4 }}>Noch über 5 Minuten geschlossen</div>
      </div>
    );
    return (
      <div style={{ padding:"14px 20px", background:"#111", borderRadius:16, border:"1px solid #222", textAlign:"center" }}>
        <div style={{ fontSize:14, fontWeight:600, color:"#999" }}>Gleich offen — warten lohnt sich</div>
      </div>
    );
  }
  if (!closed && status.until) {
    const r = cd(status.until, now);
    if (r.t < 180) return (
      <div style={{ padding:"14px 20px", background:"#0a1a0f", borderRadius:16, border:"1px solid #1a3a25", textAlign:"center" }}>
        <div style={{ fontSize:14, fontWeight:600, color:"#6ee7a0" }}>Jetzt überqueren</div>
      </div>
    );
  }
  return null;
}

function PhaseTimeline({ phases, now }) {
  const start = new Date(now.getTime() - 5*60000);
  const end = new Date(now.getTime() + 90*60000);
  const tot = end - start;
  const p = d => Math.max(0, Math.min(100, ((d-start)/tot)*100));

  // Time markers
  const marks = [];
  const m = new Date(start); m.setMinutes(Math.ceil(m.getMinutes()/30)*30,0,0);
  while (m < end) { marks.push(new Date(m)); m.setMinutes(m.getMinutes()+30); }

  return (
    <div className="fade-in fade-in-3" style={{ padding:"0 24px" }}>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.2em", color:"#444", marginBottom:12, textTransform:"uppercase" }}>Nächste 90 Min</div>
      <div style={{ position:"relative", height:48, background:"#0a0a0a", borderRadius:10, overflow:"hidden" }}>
        {/* Open = dark, Closed = red blocks */}
        {phases.map((ph,i) => {
          const l = p(ph.closeAt), r = p(ph.openAt);
          if (r <= 0 || l >= 100) return null;
          const left = Math.max(0,l), width = Math.min(100,r) - left;
          return (
            <div key={i} style={{ position:"absolute", top:0, bottom:0, left:`${left}%`, width:`${width}%`, background:"#1c0606", borderLeft: l > 1 ? "1px solid #3b1111" : "none" }}>
              {width > 8 && (
                <div className="mono" style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", fontSize:10, color:"#ef444480", whiteSpace:"nowrap" }}>
                  {durMin(ph.closeAt,ph.openAt)}′
                </div>
              )}
            </div>
          );
        })}
        {/* Time marks */}
        {marks.map((t,i) => (
          <div key={i} style={{ position:"absolute", top:0, bottom:0, left:`${p(t)}%`, width:1, background:"#1a1a1a" }}>
            <span className="mono" style={{ position:"absolute", bottom:4, left:4, fontSize:9, color:"#333", whiteSpace:"nowrap" }}>{fmt(t)}</span>
          </div>
        ))}
        {/* Now marker */}
        <div style={{ position:"absolute", top:0, bottom:0, left:`${p(now)}%`, width:1.5, background:"#fff", zIndex:10 }}>
          <div style={{ position:"absolute", top:-2, left:-3, width:7, height:7, borderRadius:"50%", background:"#fff" }} />
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"center", gap:20, marginTop:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ width:12, height:8, borderRadius:2, background:"#0a0a0a", border:"1px solid #1a1a1a" }} />
          <span style={{ fontSize:10, color:"#444" }}>Offen</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ width:12, height:8, borderRadius:2, background:"#1c0606", border:"1px solid #3b1111" }} />
          <span style={{ fontSize:10, color:"#444" }}>Zu</span>
        </div>
      </div>
    </div>
  );
}

function NextPhases({ phases, now }) {
  const upcoming = [];
  const ws = new Date(now.getTime() - 2*60000);
  const we = new Date(now.getTime() + 90*60000);
  const rel = phases.filter(p => p.openAt > ws && p.closeAt < we);

  for (let i = 0; i < Math.min(rel.length, 4); i++) {
    const ph = rel[i];
    const isCurrent = now >= ph.closeAt && now <= ph.openAt;
    const isPast = ph.openAt < now;
    const dur = durMin(ph.closeAt, ph.openAt);
    upcoming.push({ ...ph, isCurrent, isPast, dur });
  }

  if (upcoming.length === 0) return null;

  return (
    <div className="fade-in fade-in-4" style={{ padding:"0 24px" }}>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.2em", color:"#444", marginBottom:12, textTransform:"uppercase" }}>Schließungen</div>
      <div style={{ display:"flex", flexDirection:"column", gap:1 }}>
        {upcoming.map((ph, i) => (
          <div key={i} style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"14px 16px", background: ph.isCurrent ? "#110505" : "#0a0a0a",
            borderRadius: i === 0 ? "12px 12px 2px 2px" : i === upcoming.length-1 ? "2px 2px 12px 12px" : 2,
            opacity: ph.isPast ? 0.3 : 1,
            borderLeft: ph.isCurrent ? "2px solid #ef4444" : "2px solid transparent",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div className="mono" style={{ fontSize:14, color: ph.isCurrent ? "#fca5a5" : "#777", fontWeight:500 }}>
                {fmt(ph.closeAt)}–{fmt(ph.openAt)}
              </div>
              {ph.isCurrent && (
                <span style={{ fontSize:10, fontWeight:600, letterSpacing:"0.1em", color:"#ef4444", padding:"2px 8px", borderRadius:4, background:"#ef444415" }}>JETZT</span>
              )}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ display:"flex", gap:3 }}>
                {ph.trains.slice(0,5).map((tr,j) => (
                  <div key={j} style={{ width:6, height:6, borderRadius:"50%", background: CAT_META[tr.cat]?.color || "#555" }} title={tr.line} />
                ))}
                {ph.trains.length > 5 && <span className="mono" style={{ fontSize:9, color:"#555" }}>+{ph.trains.length-5}</span>}
              </div>
              <span className="mono" style={{ fontSize:13, color:"#555" }}>{ph.dur}′</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TrainList({ trains, now }) {
  const list = trains.filter(t => (t.actual-now)/60000 > -2 && (t.actual-now)/60000 < 60).slice(0,12);
  if (list.length === 0) return <div style={{ padding:24, textAlign:"center", color:"#333", fontSize:13 }}>Keine Züge in der nächsten Stunde</div>;
  return (
    <div style={{ padding:"0 24px" }}>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.2em", color:"#444", marginBottom:12, textTransform:"uppercase" }}>Züge</div>
      {list.map((t, i) => {
        const diff = Math.floor((t.actual - now) / 60000);
        const meta = CAT_META[t.cat] || CAT_META.S;
        return (
          <div key={t.id+i} style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"11px 0", borderBottom:"1px solid #111",
            opacity: diff < 0 ? 0.25 : 1,
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:0 }}>
              <div style={{ width:3, height:24, borderRadius:1.5, background:meta.color, flexShrink:0 }} />
              <div style={{ minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
                  <span className="mono" style={{ fontSize:13, color:meta.color, fontWeight:500 }}>{t.line.replace(/\s+/g,"")}</span>
                  {t.through && <span style={{ fontSize:9, color:"#444", fontWeight:600, letterSpacing:"0.05em" }}>DURCH</span>}
                </div>
                <div style={{ fontSize:12, color:"#555", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.dest}</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
              {t.delay > 0 && <span className="mono" style={{ fontSize:11, color:"#ef4444" }}>+{t.delay}</span>}
              <span className="mono" style={{ fontSize:14, color: diff <= 0 ? "#fbbf24" : "#888", fontWeight:500 }}>
                {diff <= 0 ? "jetzt" : `${diff}′`}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SettingsSheet({ show, onClose, liveEnabled, onToggleLive }) {
  if (!show) return null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:100, background:"#000000ee", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={(e)=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{ width:"100%", maxWidth:480, padding:"32px 28px 40px", background:"#0a0a0a", borderRadius:"24px 24px 0 0", animation:"slideUp .3s ease-out", borderTop:"1px solid #1a1a1a" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:28 }}>
          <span style={{ fontSize:18, fontWeight:700, color:"#fff" }}>Einstellungen</span>
          <button onClick={onClose} style={{ background:"#1a1a1a", border:"none", color:"#777", width:32, height:32, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:16 }}>✕</button>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0", borderTop:"1px solid #151515" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:600, color:"#ccc" }}>Live-Zugdaten</div>
            <div style={{ fontSize:12, color:"#555", marginTop:4, lineHeight:1.5 }}>S6 und RB61 in Echtzeit. Durchfahrten (ICE, IC, Güter) werden aus dem Modellfahrplan ergänzt.</div>
          </div>
          <button onClick={onToggleLive} style={{
            width:48, height:28, borderRadius:14, border:"none", cursor:"pointer", position:"relative", transition:"background 0.3s",
            background: liveEnabled ? "#22c55e" : "#333", flexShrink:0, marginLeft:16,
          }}>
            <span style={{ position:"absolute", top:2, left:liveEnabled?22:2, width:24, height:24, borderRadius:"50%", background:"#fff", transition:"left 0.2s cubic-bezier(.4,0,.2,1)", boxShadow:"0 1px 3px rgba(0,0,0,.3)" }}/>
          </button>
        </div>
        <div style={{ marginTop:20, padding:"14px 16px", background:"#111", borderRadius:12 }}>
          <div style={{ fontSize:12, color:"#555", lineHeight:1.7 }}>
            Durchfahrende Züge erscheinen nicht in der DB-API und werden geschätzt. Die tatsächliche Schließzeit kann daher abweichen. Alle Angaben ohne Gewähr.
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════

function App() {
  const [now, setNow] = useState(new Date());
  const [view, setView] = useState("status"); // status | trains
  const [showSettings, setShowSettings] = useState(false);
  const [liveEnabled, setLiveEnabled] = useState(true);
  const [apiTrains, setApiTrains] = useState(null);
  const [apiStatus, setApiStatus] = useState("loading");

  useEffect(() => { const t = setInterval(() => setNow(new Date()), 500); return () => clearInterval(t); }, []);

  const fetchApi = useCallback(async () => {
    if (!liveEnabled) { setApiTrains(null); setApiStatus("off"); return; }
    setApiStatus("loading");
    const result = await fetchLiveTrains();
    if (result && result.length > 0) { setApiTrains(result); setApiStatus("live"); }
    else { setApiTrains(null); setApiStatus("error"); }
  }, [liveEnabled]);

  useEffect(() => { fetchApi(); if (liveEnabled) { const iv = setInterval(fetchApi, 90000); return () => clearInterval(iv); } }, [fetchApi]);

  const epoch5 = Math.floor(now.getTime() / 300000);
  const { trains, phases } = useMemo(() => {
    const base = buildSchedule(now);
    const modelDelayed = addDelays(base, epoch5);
    if (apiTrains && apiTrains.length > 0) {
      const throughTrains = modelDelayed.filter(t => t.through);
      const liveTrips = new Set(apiTrains.map(t => `${t.line}-${t.sched.getHours()}-${t.sched.getMinutes()}`));
      const unique = throughTrains.filter(t => !liveTrips.has(`${t.line}-${t.sched.getHours()}-${t.sched.getMinutes()}`));
      const merged = [...apiTrains, ...unique].sort((a, b) => a.actual - b.actual);
      return { trains: merged, phases: calcPhases(merged) };
    }
    return { trains: modelDelayed, phases: calcPhases(modelDelayed) };
  }, [epoch5, apiTrains]);

  const status = useMemo(() => getStatus(phases, now), [phases, now]);
  const closed = status.closed;

  return (
    <div style={{ minHeight:"100vh", background:"#000", maxWidth:480, margin:"0 auto" }}>
      {/* Header — minimal */}
      <div className="fade-in" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"20px 24px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <StatusOrb closed={closed} />
          <span style={{ fontSize:13, fontWeight:600, color:"#555", letterSpacing:"0.02em" }}>Buchschlag</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {apiStatus === "live" && (
            <span className="mono" style={{ fontSize:10, color:"#333", marginRight:4 }}>LIVE</span>
          )}
          <button onClick={fetchApi} style={{ background:"none", border:"none", color:"#333", fontSize:16, cursor:"pointer", padding:8, borderRadius:8 }}>↻</button>
          <button onClick={() => setShowSettings(true)} style={{ background:"none", border:"none", color:"#333", fontSize:16, cursor:"pointer", padding:8, borderRadius:8 }}>⚙</button>
        </div>
      </div>

      {/* Hero — the one thing that matters */}
      <div className="fade-in fade-in-1" style={{ padding:"48px 24px 20px", textAlign:"center" }}>
        <div style={{
          fontSize: closed ? 42 : 42,
          fontWeight: 700,
          letterSpacing: "-0.03em",
          color: "#fff",
          lineHeight: 1,
          marginBottom: 32,
        }}>
          {closed ? "Geschlossen" : "Offen"}
        </div>
        <HeroCountdown target={status.until} now={now} closed={closed} />
      </div>

      {/* Action hint */}
      <div className="fade-in fade-in-2" style={{ padding:"0 24px", marginBottom:32 }}>
        <ActionHint closed={closed} status={status} now={now} phases={phases} />
      </div>

      {/* Segmented control */}
      <div style={{ display:"flex", margin:"0 24px 20px", background:"#0a0a0a", borderRadius:10, padding:3 }}>
        {[{id:"status",l:"Übersicht"},{id:"trains",l:"Züge"}].map(t => (
          <button key={t.id} onClick={() => setView(t.id)} style={{
            flex:1, padding:"10px 0", fontSize:13, fontWeight: view===t.id ? 600 : 400,
            color: view===t.id ? "#fff" : "#555",
            background: view===t.id ? "#1a1a1a" : "transparent",
            border:"none", cursor:"pointer", borderRadius:8,
            transition:"all .2s",
          }}>{t.l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ paddingBottom:40 }}>
        {view === "status" && (
          <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
            <PhaseTimeline phases={phases} now={now} />
            <NextPhases phases={phases} now={now} />
          </div>
        )}
        {view === "trains" && <TrainList trains={trains} now={now} />}
      </div>

      {/* Footer */}
      <div style={{ padding:"12px 24px calc(20px + env(safe-area-inset-bottom, 0px))", textAlign:"center" }}>
        <div style={{ fontSize:10, color:"#222", lineHeight:1.8 }}>
          Prognose · Keine offizielle DB-App · Ohne Gewähr
        </div>
      </div>

      <SettingsSheet show={showSettings} onClose={() => setShowSettings(false)} liveEnabled={liveEnabled} onToggleLive={() => setLiveEnabled(!liveEnabled)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
