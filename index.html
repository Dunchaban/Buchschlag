<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BÜ Buchschlag">
<meta name="theme-color" content="#0f1117">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚧</text></svg>">
<title>BÜ Buchschlag</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-proxima-nova@1.0.1/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — Agentur-Abnahme 01.03.2026
   
   Grundentscheidung: KEIN reines Schwarz.
   Dunkles Slate (#0f1117) als Basis — funktioniert auf
   OLED, LCD, und bei Sonnenlicht gleichermaßen.
   
   SURFACES:
     --bg:       #0f1117  Seitenhintergrund
     --card:     #1a1d27  Karten, Content-Flächen
     --card-alt: #222638  Erhöhte Elemente in Karten
     --border:   #2a2e3d  Trennlinien, Ränder
   
   TEXT (alle WCAG AA auf --bg):
     --t1: #f0f1f4  Primär    — 15.2:1 ✓
     --t2: #c8cad2  Sekundär  — 10.4:1 ✓
     --t3: #8e92a3  Tertiär   —  5.5:1 ✓
     --t4: #5d6178  Quaternär —  3.2:1 ✓ (nur >18px)
   
   TEXT (alle WCAG AA auf --card):
     --t1 on card: 12.8:1 ✓
     --t2 on card:  8.7:1 ✓
     --t3 on card:  4.6:1 ✓
   
   AKZENTE:
     rot:  #f87171  — 6.2:1 auf --bg ✓
     grün: #4ade80  — 8.1:1 auf --bg ✓
     gelb: #fbbf24  — 11.5:1 auf --bg ✓
   ═══════════════════════════════════════════════════ */

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-alt: #222638;
  --border: #2a2e3d;
  --t1: #f0f1f4;
  --t2: #c8cad2;
  --t3: #8e92a3;
  --t4: #5d6178;
  --red: #f87171;
  --red-dim: #401515;
  --green: #4ade80;
  --green-dim: #0d3320;
  --yellow: #fbbf24;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--t1);
  font-family:'Proxima Nova','proxima-nova',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;min-height:100%;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:none;
}
#root{
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
}
::-webkit-scrollbar{width:0;height:0}
button{-webkit-appearance:none;touch-action:manipulation;font-family:inherit}

@keyframes breathe{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 12px var(--glow)}50%{box-shadow:0 0 28px var(--glow)}}

.mono{font-family:'DM Mono',monospace;font-weight:400}
.fade-in{animation:fadeIn .5s ease-out both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const CLOSE_BEFORE = 180, OPEN_AFTER = 40, MERGE_GAP = 240, MIN_OPEN = 90;

const CAT = {
  S:  { color:"#34d399", label:"S-Bahn" },
  RB: { color:"#f472b6", label:"RB" },
  RE: { color:"#f472b6", label:"RE" },
  ICE:{ color:"#c4b5fd", label:"ICE" },
  IC: { color:"#c4b5fd", label:"IC" },
  EC: { color:"#c4b5fd", label:"EC" },
  G:  { color:"#8e92a3", label:"Güter" },
};

function buildSchedule(date) {
  const day=date.getDay(),isSun=day===0,isSat=day===6,isWd=!isSun&&!isSat;
  const t=[];
  const add=(h,m,cat,line,dest,track,stops)=>{
    if(h<0||h>23)return;const d=new Date(date);d.setHours(h,m,0,0);
    t.push({id:`${line.replace(/\s/g,"")}-${h}${String(m).padStart(2,"0")}`,cat,line,dest,track,stops,sched:new Date(d),actual:new Date(d),delay:0,through:!stops});
  };
  for(let h=5;h<=23;h++){
    const hvz=isWd&&((h>=6&&h<=9)||(h>=16&&h<=19));
    (hvz?[8,23,38,53]:(h===5||h===23)?[38]:[8,38]).forEach(m=>{
      add(h,m,"S","S 6",m%30===8?"Friedberg":"Bad Vilbel",2,true);
      add(h,m,"S","S 6",m%30===8?"Darmstadt":"Langen",3,true);
    });
    if(h>=6&&h<=22){
      add(h,27,"RB","RB 61",h%2===0?"Dieburg":"Ffm Hbf",1,true);
      if(hvz||(h>=7&&h<=20&&!isSun))add(h,50,"RB","RB 61",h%2===0?"Ffm Hbf":"Ober Roden",1,true);
    }
    if(h>=6&&h<=22){
      add(h,12,"ICE",`ICE ${100+h*2}`,"Stuttgart",4,false);
      add(h,18,"ICE",`ICE ${101+h*2}`,"Frankfurt",5,false);
      if(h%2===0)add(h,42,"IC",`IC ${200+h}`,"Heidelberg",4,false);
      if(h%2===1)add(h,48,"EC",`EC ${50+h}`,"Frankfurt",5,false);
    }
    if(h<7||h>20){add(h,5,"G","GZ","Mannheim",4,false);add(h,35,"G","GZ","Ffm Ost",5,false);}
    else if(h%3===0)add(h,32,"G","GZ","Mannheim",4,false);
  }
  return t.sort((a,b)=>a.sched-b.sched);
}

function addDelays(trains,seed){
  let s=seed+7;const rnd=()=>{s=(s*48271)%2147483647;return s/2147483647;};
  return trains.map(t=>{const r=rnd();let d=0;
    if(t.cat==="G"&&r<0.35)d=1+Math.floor(rnd()*18);
    else if(["ICE","IC","EC"].includes(t.cat)&&r<0.3)d=1+Math.floor(rnd()*12);
    else if(t.cat==="S"&&r<0.2)d=1+Math.floor(rnd()*6);
    else if(t.cat==="RB"&&r<0.15)d=1+Math.floor(rnd()*8);
    return{...t,delay:d,actual:new Date(t.sched.getTime()+d*60000)};
  });
}

function calcPhases(trains){
  const evts=trains.map(t=>({close:new Date(t.actual.getTime()-CLOSE_BEFORE*1000),open:new Date(t.actual.getTime()+OPEN_AFTER*1000),train:t})).sort((a,b)=>a.close-b.close);
  const ph=[];let cur=null;
  for(const e of evts){
    if(!cur){cur={closeAt:e.close,openAt:e.open,trains:[e.train]};}
    else{const gap=(e.close-cur.openAt)/1000;
      if(gap<MERGE_GAP||gap<MIN_OPEN){cur.openAt=new Date(Math.max(cur.openAt.getTime(),e.open.getTime()));cur.trains.push(e.train);}
      else{ph.push(cur);cur={closeAt:e.close,openAt:e.open,trains:[e.train]};}}
  }
  if(cur)ph.push(cur);return ph;
}

function getStatus(phases,now){
  for(const p of phases){if(now>=p.closeAt&&now<=p.openAt)return{closed:true,until:p.openAt,since:p.closeAt,phase:p};}
  const next=phases.find(p=>p.closeAt>now);
  return{closed:false,until:next?.closeAt||null,nextPhase:next||null};
}

const fmt=d=>d?d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}):"—";
function cd(tgt,now){if(!tgt)return{m:"—",s:"—",t:Infinity};const d=Math.max(0,Math.floor((tgt-now)/1000));return{m:String(Math.floor(d/60)).padStart(2,"0"),s:String(d%60).padStart(2,"0"),t:d};}
function durMin(a,b){return Math.max(1,Math.round((b-a)/60000));}

const EVA="8001236",API="https://v6.db.transport.rest";
function mapP(p){if(p==="nationalExpress")return"ICE";if(p==="national")return"IC";if(p==="regionalExpress")return"RE";if(p==="regional")return"RB";if(p==="suburban")return"S";return"S";}

async function fetchLive(){
  try{
    const r=await fetch(`${API}/stops/${EVA}/departures?duration=120&results=60&bus=false&ferry=false&taxi=false`);
    if(!r.ok)throw new Error();
    const raw=await r.json();const deps=Array.isArray(raw)?raw:(raw.departures||[]);
    let arrs=[];
    try{const r2=await fetch(`${API}/stops/${EVA}/arrivals?duration=120&results=60&bus=false&ferry=false&taxi=false`);if(r2.ok){const a=await r2.json();arrs=Array.isArray(a)?a:(a.arrivals||[]);}}catch(e){}
    const seen=new Set(deps.map(d=>d.tripId));const all=[...deps];
    arrs.forEach(a=>{if(!seen.has(a.tripId)){all.push(a);seen.add(a.tripId);}});
    const trains=all.map((d,i)=>{const cat=mapP(d.line?.product||"");
      return{id:`live-${d.tripId||i}`,cat,line:d.line?.name||cat,dest:d.direction||d.destination?.name||"—",track:parseInt(d.platform||d.plannedPlatform||"1"),stops:["S","RB","RE"].includes(cat),sched:new Date(d.plannedWhen||d.when),actual:new Date(d.when||d.plannedWhen),delay:Math.round((d.delay||0)/60),through:!["S","RB","RE"].includes(cat)};
    });
    return trains.length>0?trains.sort((a,b)=>a.sched-b.sched):null;
  }catch(e){return null;}
}

// ═══════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════

function StatusCard({closed,status,now}){
  const c=cd(status.until,now);
  const critical=c.t<30;
  const accent=closed?"var(--red)":"var(--green)";
  const accentDim=closed?"var(--red-dim)":"var(--green-dim)";
  return(
    <div style={{
      margin:"0 16px",borderRadius:20,overflow:"hidden",
      background:`linear-gradient(170deg, ${accentDim} 0%, var(--card) 40%)`,
      border:`1px solid ${closed?"#5c2020":"#1a4d2e"}`,
    }}>
      {/* Status + orb */}
      <div style={{padding:"32px 28px 0",display:"flex",alignItems:"center",gap:14}}>
        <div style={{position:"relative",width:16,height:16,flexShrink:0}}>
          <div style={{position:"absolute",inset:0,borderRadius:"50%",background:accent,animation:"breathe 2.5s ease-in-out infinite"}}/>
          <div style={{position:"absolute",inset:-4,borderRadius:"50%",border:`2px solid ${accent}40`,animation:"breathe 2.5s ease-in-out infinite",animationDelay:".3s"}}/>
        </div>
        <span style={{fontSize:32,fontWeight:700,letterSpacing:"-0.02em",color:"var(--t1)"}}>
          {closed?"Geschlossen":"Offen"}
        </span>
      </div>

      {/* Countdown */}
      <div style={{padding:"24px 28px 8px",textAlign:"center"}}>
        <div className="mono" style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:3,lineHeight:1}}>
          <span style={{fontSize:"min(88px, 22vw)",fontWeight:300,letterSpacing:"-0.04em",color:critical?"var(--yellow)":"var(--t1)",transition:"color .6s"}}>{c.m}</span>
          <span style={{fontSize:"min(50px, 12vw)",fontWeight:300,color:"var(--t4)",lineHeight:1}}>:</span>
          <span style={{fontSize:"min(88px, 22vw)",fontWeight:300,letterSpacing:"-0.04em",color:critical?"var(--yellow)":"var(--t1)",transition:"color .6s"}}>{c.s}</span>
        </div>
        <div style={{fontSize:13,fontWeight:500,letterSpacing:"0.15em",textTransform:"uppercase",color:"var(--t3)",marginTop:12}}>
          {closed?"öffnet in":"schließt in"}
        </div>
        {status.until&&<div className="mono" style={{fontSize:14,color:"var(--t3)",marginTop:6}}>ca. {fmt(status.until)} Uhr</div>}
      </div>

      {/* Action bar */}
      <div style={{padding:"12px 20px 20px"}}>
        {closed&&status.until&&(()=>{
          if(c.t>300)return(
            <div style={{padding:"12px 16px",background:"rgba(248,113,113,.08)",borderRadius:12,border:"1px solid rgba(248,113,113,.15)",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>↗</span>
              <div><div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>Umfahrung empfohlen</div>
              <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>Noch über 5 Minuten geschlossen</div></div>
            </div>
          );
          return(
            <div style={{padding:"12px 16px",background:"rgba(251,191,36,.06)",borderRadius:12,border:"1px solid rgba(251,191,36,.12)",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>⏳</span>
              <div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>Gleich offen — warten lohnt sich</div>
            </div>
          );
        })()}
        {!closed&&status.until&&c.t<180&&(
          <div style={{padding:"12px 16px",background:"rgba(74,222,128,.08)",borderRadius:12,border:"1px solid rgba(74,222,128,.15)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🚗</span>
            <div style={{fontSize:14,fontWeight:600,color:"var(--green)"}}>Jetzt schnell überqueren</div>
          </div>
        )}
        {!closed&&status.until&&c.t>=180&&(
          <div style={{padding:"12px 16px",background:"rgba(74,222,128,.05)",borderRadius:12,border:"1px solid rgba(74,222,128,.1)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>✓</span>
            <div><div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>Freie Überfahrt</div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>Noch ca. {Math.ceil(c.t/60)} Minuten offen</div></div>
          </div>
        )}
      </div>
    </div>
  );
}

function PhaseTimeline({phases,now}){
  const start=new Date(now.getTime()-5*60000),end=new Date(now.getTime()+90*60000),tot=end-start;
  const p=d=>Math.max(0,Math.min(100,((d-start)/tot)*100));
  const marks=[];const m=new Date(start);m.setMinutes(Math.ceil(m.getMinutes()/30)*30,0,0);
  while(m<end){marks.push(new Date(m));m.setMinutes(m.getMinutes()+30);}
  return(
    <div style={{margin:"0 16px",background:"var(--card)",borderRadius:16,padding:"18px 18px 14px",border:"1px solid var(--border)"}}>
      <div style={{fontSize:12,fontWeight:600,letterSpacing:"0.12em",color:"var(--t3)",marginBottom:12,textTransform:"uppercase"}}>Nächste 90 Minuten</div>
      <div style={{position:"relative",height:52,background:"var(--card-alt)",borderRadius:8,overflow:"hidden"}}>
        {phases.map((ph,i)=>{
          const l=p(ph.closeAt),r=p(ph.openAt);
          if(r<=0||l>=100)return null;
          const left=Math.max(0,l),width=Math.min(100,r)-left;
          return(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${width}%`,background:"#4c1616",borderLeft:l>1?"1px solid #6b2020":"none"}}>
            {width>8&&<div className="mono" style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:11,color:"var(--red)",whiteSpace:"nowrap",fontWeight:500}}>{durMin(ph.closeAt,ph.openAt)}′</div>}
          </div>);
        })}
        {marks.map((t,i)=>(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${p(t)}%`,width:1,background:"var(--border)"}}>
          <span className="mono" style={{position:"absolute",bottom:6,left:6,fontSize:10,color:"var(--t3)",whiteSpace:"nowrap"}}>{fmt(t)}</span>
        </div>))}
        <div style={{position:"absolute",top:0,bottom:0,left:`${p(now)}%`,width:2,background:"var(--t1)",zIndex:10,borderRadius:1}}>
          <div style={{position:"absolute",top:-3,left:-4,width:10,height:10,borderRadius:"50%",background:"var(--t1)"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:16,marginTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:12,height:8,borderRadius:2,background:"var(--card-alt)"}}/>
          <span style={{fontSize:11,color:"var(--t3)"}}>Offen</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:12,height:8,borderRadius:2,background:"#4c1616"}}/>
          <span style={{fontSize:11,color:"var(--t3)"}}>Geschlossen</span>
        </div>
      </div>
    </div>
  );
}

function NextPhases({phases,now}){
  const ws=new Date(now.getTime()-2*60000),we=new Date(now.getTime()+90*60000);
  const rel=phases.filter(p=>p.openAt>ws&&p.closeAt<we).slice(0,4);
  if(rel.length===0)return null;
  return(
    <div style={{margin:"0 16px",background:"var(--card)",borderRadius:16,padding:4,border:"1px solid var(--border)"}}>
      <div style={{padding:"14px 14px 8px",fontSize:12,fontWeight:600,letterSpacing:"0.12em",color:"var(--t3)",textTransform:"uppercase"}}>Schließungen</div>
      {rel.map((ph,i)=>{
        const cur=now>=ph.closeAt&&now<=ph.openAt;
        const past=ph.openAt<now;
        const dur=durMin(ph.closeAt,ph.openAt);
        const rem=cur?cd(ph.openAt,now):null;
        return(
          <div key={i} style={{
            display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"13px 14px",
            background:cur?"var(--red-dim)":"transparent",
            borderRadius:12,opacity:past?0.3:1,
            borderLeft:cur?"3px solid var(--red)":"3px solid transparent",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
              <div className="mono" style={{fontSize:15,color:cur?"var(--red)":"var(--t2)",fontWeight:500}}>
                {fmt(ph.closeAt)} – {fmt(ph.openAt)}
              </div>
              {cur&&<span style={{fontSize:11,fontWeight:700,letterSpacing:"0.06em",color:"var(--red)",padding:"2px 8px",borderRadius:5,background:"rgba(248,113,113,.15)"}}>JETZT</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{display:"flex",gap:3}}>
                {ph.trains.slice(0,5).map((tr,j)=>(
                  <div key={j} style={{width:7,height:7,borderRadius:"50%",background:CAT[tr.cat]?.color||"var(--t3)"}} title={tr.line}/>
                ))}
                {ph.trains.length>5&&<span className="mono" style={{fontSize:10,color:"var(--t3)"}}>+{ph.trains.length-5}</span>}
              </div>
              {cur&&rem?
                <span className="mono" style={{fontSize:15,fontWeight:500,color:"var(--red)"}}>{rem.m}:{rem.s}</span>:
                <span className="mono" style={{fontSize:14,color:"var(--t3)"}}>{dur}′</span>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TrainList({trains,now}){
  const list=trains.filter(t=>(t.actual-now)/60000>-2&&(t.actual-now)/60000<60).slice(0,12);
  if(!list.length)return<div style={{padding:32,textAlign:"center",color:"var(--t3)",fontSize:14}}>Keine Züge in der nächsten Stunde</div>;
  return(
    <div style={{margin:"0 16px",background:"var(--card)",borderRadius:16,padding:"4px 0",border:"1px solid var(--border)",overflow:"hidden"}}>
      <div style={{padding:"14px 18px 8px",fontSize:12,fontWeight:600,letterSpacing:"0.12em",color:"var(--t3)",textTransform:"uppercase"}}>Nächste Züge</div>
      {list.map((t,i)=>{
        const diff=Math.floor((t.actual-now)/60000);
        const meta=CAT[t.cat]||CAT.S;
        const isNext=i===0&&diff>=0;
        return(
          <div key={t.id+i} style={{
            display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"12px 18px",
            background:isNext?"var(--card-alt)":"transparent",
            borderBottom:i<list.length-1?`1px solid ${isNext?"transparent":"var(--border)"}`:undefined,
            opacity:diff<0?0.25:1,
          }}>
            <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
              <div style={{width:4,height:32,borderRadius:2,background:meta.color,flexShrink:0}}/>
              <div style={{minWidth:0}}>
                <div style={{display:"flex",alignItems:"baseline",gap:7}}>
                  <span className="mono" style={{fontSize:15,color:meta.color,fontWeight:500}}>{t.line.replace(/\s+/g,"")}</span>
                  {t.through&&<span style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:"0.04em"}}>DURCH</span>}
                </div>
                <div style={{fontSize:13,color:"var(--t3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{t.dest}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:8,flexShrink:0}}>
              {t.delay>0&&<span className="mono" style={{fontSize:12,color:"var(--red)",fontWeight:500}}>+{t.delay}</span>}
              <span className="mono" style={{
                fontSize:16,fontWeight:500,
                color:diff<=0?"var(--yellow)":diff<=3?"var(--t1)":"var(--t2)",
              }}>
                {diff<=0?"jetzt":`${diff}′`}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Settings({show,onClose,liveEnabled,onToggleLive}){
  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(15,17,23,.9)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{width:"100%",maxWidth:480,padding:"28px 24px 40px",background:"var(--card)",borderRadius:"20px 20px 0 0",animation:"slideUp .25s ease-out",borderTop:"1px solid var(--border)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <span style={{fontSize:18,fontWeight:700,color:"var(--t1)"}}>Einstellungen</span>
          <button onClick={onClose} style={{background:"var(--card-alt)",border:"1px solid var(--border)",color:"var(--t2)",width:34,height:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15}}>✕</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0",borderTop:"1px solid var(--border)"}}>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:"var(--t1)"}}>Live-Zugdaten</div>
            <div style={{fontSize:13,color:"var(--t3)",marginTop:5,lineHeight:1.6}}>S6 und RB61 in Echtzeit.<br/>Durchfahrten werden geschätzt.</div>
          </div>
          <button onClick={onToggleLive} style={{width:50,height:30,borderRadius:15,border:"none",cursor:"pointer",position:"relative",transition:"background .3s",background:liveEnabled?"var(--green)":"var(--card-alt)",flexShrink:0,marginLeft:16}}>
            <span style={{position:"absolute",top:3,left:liveEnabled?23:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left .2s cubic-bezier(.4,0,.2,1)",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}/>
          </button>
        </div>
        <div style={{marginTop:16,padding:"14px 16px",background:"var(--bg)",borderRadius:12,border:"1px solid var(--border)"}}>
          <div style={{fontSize:12,color:"var(--t3)",lineHeight:1.7}}>
            Durchfahrende Züge (ICE, IC, Güter) erscheinen nicht in der DB-API und werden aus dem Modellfahrplan ergänzt. Die Schließzeit kann daher abweichen.
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════
// APP
// ═══════════════════════

function App(){
  const [now,setNow]=useState(new Date());
  const [view,setView]=useState("status");
  const [showSettings,setShowSettings]=useState(false);
  const [liveEnabled,setLiveEnabled]=useState(true);
  const [apiTrains,setApiTrains]=useState(null);
  const [apiStatus,setApiStatus]=useState("loading");

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),500);return()=>clearInterval(t);},[]);

  const fetchApi=useCallback(async()=>{
    if(!liveEnabled){setApiTrains(null);setApiStatus("off");return;}
    setApiStatus("loading");
    const r=await fetchLive();
    if(r&&r.length>0){setApiTrains(r);setApiStatus("live");}
    else{setApiTrains(null);setApiStatus("error");}
  },[liveEnabled]);

  useEffect(()=>{fetchApi();if(liveEnabled){const iv=setInterval(fetchApi,90000);return()=>clearInterval(iv);}},[fetchApi]);

  const epoch5=Math.floor(now.getTime()/300000);
  const {trains,phases}=useMemo(()=>{
    const base=buildSchedule(now),md=addDelays(base,epoch5);
    if(apiTrains&&apiTrains.length>0){
      const through=md.filter(t=>t.through);
      const liveK=new Set(apiTrains.map(t=>`${t.line}-${t.sched.getHours()}-${t.sched.getMinutes()}`));
      const unique=through.filter(t=>!liveK.has(`${t.line}-${t.sched.getHours()}-${t.sched.getMinutes()}`));
      return{trains:[...apiTrains,...unique].sort((a,b)=>a.actual-b.actual),phases:calcPhases([...apiTrains,...unique].sort((a,b)=>a.actual-b.actual))};
    }
    return{trains:md,phases:calcPhases(md)};
  },[epoch5,apiTrains]);

  const status=useMemo(()=>getStatus(phases,now),[phases,now]);
  const closed=status.closed;

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",maxWidth:480,margin:"0 auto",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>

      {/* Header */}
      <div className="fade-in" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:14,fontWeight:600,color:"var(--t2)"}}>BÜ Buchschlag</span>
          {apiStatus==="live"&&<span className="mono" style={{fontSize:10,fontWeight:500,color:"var(--green)",letterSpacing:"0.08em",marginLeft:4,padding:"2px 6px",background:"rgba(74,222,128,.1)",borderRadius:4}}>LIVE</span>}
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={fetchApi} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--t3)",fontSize:16,cursor:"pointer",padding:0,borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>↻</button>
          <button onClick={()=>setShowSettings(true)} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--t3)",fontSize:16,cursor:"pointer",padding:0,borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
        </div>
      </div>

      {/* Hero status card */}
      <div style={{marginBottom:16}}><StatusCard closed={closed} status={status} now={now}/></div>

      {/* Tab bar */}
      <div style={{display:"flex",margin:"0 16px 12px",background:"var(--card)",borderRadius:12,padding:3,border:"1px solid var(--border)"}}>
        {[{id:"status",l:"Übersicht"},{id:"trains",l:"Züge"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{
            flex:1,padding:"11px 0",fontSize:14,fontWeight:view===t.id?600:400,
            color:view===t.id?"var(--t1)":"var(--t3)",
            background:view===t.id?"var(--card-alt)":"transparent",
            border:"none",cursor:"pointer",borderRadius:10,transition:"all .2s",
          }}>{t.l}</button>
        ))}
      </div>

      {/* Content */}
      <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:12,paddingBottom:24}}>
        {view==="status"&&<>
          <PhaseTimeline phases={phases} now={now}/>
          <NextPhases phases={phases} now={now}/>
        </>}
        {view==="trains"&&<TrainList trains={trains} now={now}/>}
      </div>

      {/* Footer */}
      <div style={{padding:"8px 20px 16px",textAlign:"center"}}>
        <div style={{fontSize:11,color:"var(--t4)",lineHeight:1.8}}>
          Prognose · Ohne Gewähr · Keine offizielle DB-App
        </div>
      </div>

      <Settings show={showSettings} onClose={()=>setShowSettings(false)} liveEnabled={liveEnabled} onToggleLive={()=>setLiveEnabled(!liveEnabled)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
